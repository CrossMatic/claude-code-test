<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      color: #ffffff;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    .name {
      font-size: 1.4rem;
      color: #a78bfa;
      margin-bottom: 0.5rem;
    }

    .date {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 2.5rem;
    }

    h2 {
      font-size: 1.2rem;
      color: #c4b5fd;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    ul {
      list-style: none;
      display: inline-block;
      text-align: left;
    }

    ul li {
      font-size: 1.1rem;
      padding: 0.6rem 1rem;
      margin-bottom: 0.5rem;
      background-color: #1e1e2e;
      border-left: 4px solid #7c3aed;
      border-radius: 4px;
      color: #d1d5db;
    }

    ul li::before {
      content: "✦ ";
      color: #7c3aed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello, World!</h1>
    <p class="name">Joshua</p>
    <p class="date">March 27, 2026</p>

    <h2>3 Things I Want to Learn About AI</h2>
    <ul>
      <li>How large language models actually work</li>
      <li>Building AI-powered applications with APIs</li>
      <li>The ethics and future impact of AI</li>
    </ul>
  </div>
</body>
</html>
